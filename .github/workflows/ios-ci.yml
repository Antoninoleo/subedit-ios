name: iOS CI (simulator)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      # Pin a Xcode 15.4 per evitare sorprese con l'ultima versione
      - name: Use Xcode 15.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.4"

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: |
          brew update
          brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --use-cache

      - name: List schemes (debug)
        run: xcodebuild -list -project SubEdit.xcodeproj

      # Build per SIMULATOR: niente firma richiesta
      - name: Build for iOS Simulator (no signing)
        run: |
          xcodebuild \
            -project SubEdit.xcodeproj \
            -scheme SubEdit \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            build
